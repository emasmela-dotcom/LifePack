<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wellness check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0e0c0a;--paper:#f5f0e8;--card:#faf7f2;--border:#cdc4b4;--rust:#c1440e;--muted:#7a6e60;--shadow:rgba(14,12,10,.08);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:24px;}
    .wrap{max-width:560px;margin:0 auto;}
    h1{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;}
    h1 em{color:var(--rust);font-style:normal;}
    .sub{color:var(--muted);font-size:.9rem;margin:8px 0 24px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px var(--shadow);}
    .hd{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:600;}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;}
    .moods{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
    .moods button{width:44px;height:44px;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:1.25rem;}
    .moods button.on{border-color:var(--rust);background:#fff5f0;}
    textarea,input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:.9rem;}
    textarea{min-height:80px;resize:vertical;}
    .btn-rust{background:var(--rust);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;cursor:pointer;font-family:inherit;}
    .entry{padding:14px 0;border-bottom:1px solid var(--border);}
    .entry:last-child{border-bottom:none;}
    .meta{font-size:.75rem;color:var(--muted);}
    .note{margin-top:6px;font-size:.9rem;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Wellness <em>check-in</em></h1>
    <p class="sub">Mood and a short note — stored only on this device.</p>
    <div class="card">
      <div class="hd">Today</div>
      <label>How do you feel? (1–5)</label>
      <div class="moods" id="moods"></div>
      <input type="hidden" id="moodVal" value="3" />
      <label style="margin-top:12px">Note (optional)</label>
      <textarea id="note" placeholder="A sentence is enough…"></textarea>
      <button type="button" class="btn-rust" style="margin-top:12px" id="saveBtn">Save check-in</button>
    </div>
    <div class="card">
      <div class="hd">History</div>
      <div id="hist"></div>
    </div>
  </div>
  <script>
    const K='wellness_checkins_v1';
    const faces=['😔','😐','😕','🙂','😄'];
    function load(){try{return JSON.parse(localStorage.getItem(K))||[];}catch{return[];}}
    function save(x){localStorage.setItem(K,JSON.stringify(x));}
    const moodsEl=document.getElementById('moods'),hidden=document.getElementById('moodVal');
    faces.forEach((f,i)=>{
      const n=i+1,b=document.createElement('button');b.type='button';b.textContent=f;b.dataset.n=n;
      b.addEventListener('click',()=>{hidden.value=n;moodsEl.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));});
      if(n===3)b.classList.add('on');
      moodsEl.appendChild(b);
    });
    function render(){
      const rows=load().slice().reverse();
      document.getElementById('hist').innerHTML=rows.length?rows.map(e=>`
        <div class="entry">
          <div class="meta">${new Date(e.t).toLocaleString()} · mood ${e.mood}/5 ${faces[e.mood-1]||''}</div>
          ${e.note?`<div class="note">${escapeHtml(e.note)}</div>`:''}
        </div>`).join(''):'<p style="color:var(--muted)">No entries yet.</p>';
    }
    function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    document.getElementById('saveBtn').addEventListener('click',()=>{
      const x=load();
      x.push({t:new Date().toISOString(),mood:parseInt(hidden.value,10)||3,note:document.getElementById('note').value.trim()});
      save(x);document.getElementById('note').value='';render();
    });
    render();
  </script>
</body>
</html>
