<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local board</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0e0c0a;--paper:#f5f0e8;--card:#faf7f2;--border:#cdc4b4;--rust:#c1440e;--muted:#7a6e60;--shadow:rgba(14,12,10,.08);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:24px;}
    .wrap{max-width:720px;margin:0 auto;}
    h1{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;}
    h1 em{color:var(--rust);font-style:normal;}
    .sub{color:var(--muted);font-size:.9rem;margin:8px 0 24px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px var(--shadow);}
    .hd{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:600;}
    input,textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);font-family:inherit;margin-bottom:10px;}
    textarea{min-height:100px;resize:vertical;}
    .btn-rust{background:var(--rust);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;cursor:pointer;font-family:inherit;}
    .post{border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;background:#fff;}
    .tag{display:inline-block;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;padding:4px 8px;background:var(--paper);border-radius:4px;color:var(--muted);margin-bottom:8px;}
    .title{font-weight:700;font-size:1.05rem;}
    .body{font-size:.9rem;margin-top:8px;line-height:1.5;color:#3a3530;}
    .when{font-size:.75rem;color:var(--muted);margin-top:10px;}
    .row{display:flex;justify-content:space-between;align-items:start;gap:10px;}
    .x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Local <em>board</em></h1>
    <p class="sub">Local posts for a niche or group — nothing leaves this browser.</p>
    <div class="card">
      <div class="hd">New post</div>
      <input type="text" id="title" placeholder="Title" />
      <input type="text" id="tag" placeholder="Tag (e.g. cycling, knitting)" />
      <textarea id="body" placeholder="What do you want to share?"></textarea>
      <button type="button" class="btn-rust" id="postBtn">Post</button>
    </div>
    <div class="card">
      <div class="hd">Board</div>
      <div id="board"></div>
    </div>
  </div>
  <script>
    const K='circle_board_posts_v1';
    function load(){try{return JSON.parse(localStorage.getItem(K))||[];}catch{return[];}}
    function save(x){localStorage.setItem(K,JSON.stringify(x));}
    function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function render(){
      const p=load().slice().reverse();
      document.getElementById('board').innerHTML=p.length?p.map(x=>`
        <div class="post" data-id="${x.id}">
          <div class="row">
            <div>
              ${x.tag?`<span class="tag">${esc(x.tag)}</span>`:''}
              <div class="title">${esc(x.title||'Untitled')}</div>
              <div class="body">${esc(x.body||'')}</div>
              <div class="when">${new Date(x.t).toLocaleString()}</div>
            </div>
            <button type="button" class="x" data-del="${x.id}">×</button>
          </div>
        </div>`).join(''):'<p style="color:var(--muted)">No posts yet.</p>';
      document.querySelectorAll('[data-del]').forEach(b=>{
        b.addEventListener('click',()=>{save(load().filter(y=>y.id!==b.dataset.del));render();});
      });
    }
    document.getElementById('postBtn').addEventListener('click',()=>{
      const title=document.getElementById('title').value.trim();
      const body=document.getElementById('body').value.trim();
      if(!title&&!body)return;
      const x=load();
      x.push({id:crypto.randomUUID(),title,body,tag:document.getElementById('tag').value.trim(),t:new Date().toISOString()});
      save(x);
      document.getElementById('title').value='';document.getElementById('tag').value='';document.getElementById('body').value='';
      render();
    });
    render();
  </script>
</body>
</html>
