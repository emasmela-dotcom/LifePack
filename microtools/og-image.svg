<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LifePack">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#0c1824"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="-10%" r="80%">
      <stop offset="0%" style="stop-color:rgba(56,189,248,0.35)"/>
      <stop offset="55%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="600" y="300" text-anchor="middle" fill="#fafafa" font-family="system-ui,Segoe UI,sans-serif" font-size="72" font-weight="800" letter-spacing="-0.03em">LifePack</text>
  <text x="600" y="380" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,Segoe UI,sans-serif" font-size="28" font-weight="500">Five apps. One life. One price.</text>
